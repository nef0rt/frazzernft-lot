<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Розыгрыш NFT | Snoop Dogg</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <div class="nft-card">
            <div class="nft-header">
                <span class="nft-collection">Snoop Dogg</span>
                <span class="nft-id">#517387</span>
            </div>
            
            <div class="nft-image-placeholder">
                <div class="placeholder-content">
                    <div class="nft-model">Chill Homie 3%</div>
                    <div class="nft-backdrop">Sapphire 1.5%</div>
                    <div class="nft-symbol">Inguz Rune 0.4%</div>
                </div>
            </div>
            
            <div class="nft-details">
                <div class="detail-row">
                    <span>Владелец</span>
                    <span class="owner-name">анонимно</span>
                </div>
                <div class="detail-row">
                    <span>Тираж</span>
                    <span>580 319 / 593 781</span>
                </div>
            </div>
            
            <div class="gift-info">
                Подарен от <span class="gift-from">нудота</span> 
                к <span class="gift-to">avtostopom po galaktike</span>
                <div class="gift-date">9 июля 2025</div>
            </div>
        </div>

        <div class="raffle-section">
            <h1 class="raffle-title">🎲 Ооооо, идет розыгрыш</h1>
            
            <div class="timer" id="timer">
                <div class="timer-item">
                    <span class="timer-value" id="days">00</span>
                    <span class="timer-label">дней</span>
                </div>
                <div class="timer-item">
                    <span class="timer-value" id="hours">00</span>
                    <span class="timer-label">часов</span>
                </div>
                <div class="timer-item">
                    <span class="timer-value" id="minutes">00</span>
                    <span class="timer-label">минут</span>
                </div>
                <div class="timer-item">
                    <span class="timer-value" id="seconds">00</span>
                    <span class="timer-label">секунд</span>
                </div>
            </div>

            <button class="participate-btn" id="participateBtn" onclick="participate()">
                Участвовать
            </button>

            <div class="stats" id="stats">
                Участников: <span id="participantsCount">0</span>
            </div>
        </div>
    </div>

    <div id="snackbar" class="snackbar"></div>

    <script src="script.js"></script>
</body>
</html>
