<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Розыгрыш NFT | Snoop Dogg</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <!-- Карточка NFT -->
        <div class="nft-card">
            <div class="nft-header">
                <span class="nft-collection">Snoop Dogg</span>
                <span class="nft-id">#517387</span>
            </div>
            
            <div class="nft-image">
                <div class="nft-image-content">
                    <div class="nft-emoji">🎤</div>
                    <div class="nft-model">Chill Homie 3%</div>
                    <div class="nft-detail">Backdrop: Sapphire 1.5%</div>
                    <div class="nft-detail">Symbol: Inguz Rune 0.4%</div>
                </div>
            </div>
            
            <div class="nft-details">
                <div class="detail-row">
                    <span>Владелец</span>
                    <span class="owner-value">анонимно</span>
                </div>
                <div class="detail-row">
                    <span>Количество</span>
                    <span class="owner-value">580 319 / 593 781</span>
                </div>
            </div>
            
            <div class="gift-info">
                <div class="gift-text">
                    <span class="gift-label">Подарен</span>
                    <span class="gift-from">нудота</span>
                    <span class="gift-arrow">→</span>
                    <span class="gift-to">avtostopom po galaktike</span>
                </div>
                <div class="gift-date">9 июля 2025</div>
                <div class="gift-comment">“Ти”</div>
            </div>
            
            <div class="nft-footer">
                <span class="telegram-badge">Telegram NFT</span>
                <span class="created-badge">Создан из подарка</span>
            </div>
        </div>

        <!-- Секция розыгрыша -->
        <div class="raffle-section">
            <h1 class="raffle-title">🎲 Ооооо, идет розыгрыш</h1>
            
            <div class="timer" id="timer">
                <div class="timer-item">
                    <span class="timer-value" id="days">00</span>
                    <span class="timer-label">дней</span>
                </div>
                <div class="timer-item">
                    <span class="timer-value" id="hours">00</span>
                    <span class="timer-label">часов</span>
                </div>
                <div class="timer-item">
                    <span class="timer-value" id="minutes">00</span>
                    <span class="timer-label">минут</span>
                </div>
                <div class="timer-item">
                    <span class="timer-value" id="seconds">00</span>
                    <span class="timer-label">секунд</span>
                </div>
            </div>

            <button class="participate-btn" id="participateBtn" onclick="participate()">
                Участвовать
            </button>

            <div class="participants-section">
                <div class="participants-header">
                    <span class="participants-title">👥 Участники</span>
                    <span class="participants-count" id="participantsCount">0</span>
                </div>
                <div class="participants-list" id="participantsList"></div>
            </div>

            <div class="winner-section" id="winnerSection"></div>
        </div>
    </div>

    <div id="snackbar" class="snackbar"></div>
    <script src="script.js"></script>
</body>
</html>
